<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #526cfe;
      --primary-dark: #3d5afe;
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #737373;
      --border: #e8e8e8;
      --section-bg: #f7f7f7;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    .home-wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Profile ── */
    .site-logo {
      font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 40px; font-family: 'Roboto Mono', monospace;
    }

    .avatar {
      width: 160px; height: 160px; border-radius: 50%;
      margin: 0 auto 28px; overflow: hidden; background: var(--border);
    }

    .avatar a { display: block; width: 100%; height: 100%; }

    .avatar img {
      width: 100%; height: 100%; object-fit: cover; object-position: center top;
      cursor: pointer; transition: opacity 0.2s, transform 0.2s;
    }

    .avatar img:hover { opacity: 0.85; transform: scale(1.04); }

    h1 {
      font-size: 42px; font-weight: 700; color: var(--text);
      margin-bottom: 10px; letter-spacing: -0.02em; text-align: center;
    }

    .tagline {
      font-size: 22px; color: var(--muted); margin-bottom: 36px;
      font-weight: 300; text-align: center;
    }

    .btn-blog {
      display: inline-block; background: var(--primary); color: #fff;
      text-decoration: none; padding: 16px 56px; border-radius: 8px;
      font-size: 20px; font-weight: 500; letter-spacing: 0.01em;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(82,108,254,0.35); margin-bottom: 56px;
    }

    .btn-blog:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(82,108,254,0.45); }
    .btn-blog:active { transform: translateY(0); }

    /* ── Sections ── */
    .sections { width: 100%; display: flex; flex-direction: column; gap: 32px; }

    .section {
      background: var(--section-bg);
      border-radius: 12px;
      padding: 24px 28px;
      width: 100%;
    }

    .section-title {
      font-size: 18px; font-weight: 700; color: var(--text);
      margin-bottom: 18px; letter-spacing: -0.01em;
    }

    .link-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }

    .link-item { display: flex; align-items: center; gap: 12px; }

    .link-item a {
      font-size: 15px; color: var(--muted); text-decoration: none;
      transition: color 0.18s; display: flex; align-items: center; gap: 10px;
    }

    .link-item a:hover { color: var(--text); }

    .link-item a span.label { color: var(--text); font-weight: 500; }
    .link-item a span.handle { color: var(--muted); }

    /* Icons */
    .icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }

    .icon-telegram { background: #229ED9; }
    .icon-youtube  { background: #FF0000; }
    .icon-github   { background: #24292e; }
    .icon-linkedin { background: #0A66C2; }
    .icon-email    { background: #ea4335; }
    .icon-link     { background: #6c757d; }

    .divider { width: 100%; height: 1px; background: var(--border); margin: 8px 0 24px; }
  </style>
</head>
<body>
