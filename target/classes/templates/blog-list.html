<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #526cfe; --danger: #e05c5c;
      --bg: #ffffff; --text: #1a1a1a; --muted: #737373; --border: #e8e8e8;
      --sidebar-bg: #1e1e2e; --sidebar-text: rgba(255,255,255,0.87);
      --sidebar-muted: rgba(255,255,255,0.45); --sidebar-hover: rgba(255,255,255,0.08);
      --sidebar-active: rgba(82,108,254,0.25); --sidebar-width: 260px;
    }
    html, body { height: 100%; font-family: 'Roboto', sans-serif; }
    body { display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }

    .sidebar { width: var(--sidebar-width); min-height: 100vh; background: var(--sidebar-bg); display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; overflow-y: auto; z-index: 100; }
    .sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .site-name { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--sidebar-text); text-decoration: none; font-family: 'Roboto Mono', monospace; display: block; }
    .nav-section { padding: 12px 0; }
    .nav-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sidebar-muted); padding: 8px 16px 4px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 13.5px; color: var(--sidebar-text); text-decoration: none; transition: background 0.15s; border-radius: 4px; margin: 1px 8px; }
    .nav-link:hover { background: var(--sidebar-hover); }
    .nav-link.active { background: var(--sidebar-active); color: #7c9bff; font-weight: 500; }
    .nav-sub { padding-left: 16px; }
    .nav-sub .nav-link { font-size: 12.5px; color: var(--sidebar-muted); padding: 7px 12px; }
    .nav-sub .nav-link.active { color: #7c9bff; }

    .main { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }

    .topbar { height: 48px; background: var(--sidebar-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .topbar-site { font-size: 13px; font-weight: 700; color: #fff; text-decoration: none; font-family: 'Roboto Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .btn-new { font-family: 'Roboto Mono', monospace; font-size: 12px; background: var(--primary); color: #fff; border: none; padding: 7px 16px; border-radius: 6px; cursor: pointer; text-decoration: none; letter-spacing: 0.03em; transition: opacity 0.18s; }
    .btn-new:hover { opacity: 0.85; }

    .btn-logout { font-family: 'Roboto Mono', monospace; font-size: 11.5px; background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.18s; }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .content-wrap { max-width: 860px; padding: 40px 48px 80px; }
    .page-heading { margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .page-heading h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }

    .post-list { list-style: none; }
    .post-item { padding: 32px 0; border-bottom: 1px solid var(--border); }
    .post-item:last-child { border-bottom: none; }
    .post-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; font-size: 12.5px; color: var(--muted); font-family: 'Roboto Mono', monospace; }
    .post-meta .sep { color: var(--border); }
    .post-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.01em; line-height: 1.3; }
    .post-title a { color: var(--text); text-decoration: none; transition: color 0.15s; }
    .post-title a:hover { color: var(--primary); }
    .post-excerpt { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
    .post-footer { display: flex; align-items: center; gap: 12px; }
    .read-more { font-size: 13.5px; font-weight: 500; color: var(--primary); text-decoration: none; transition: opacity 0.15s; }
    .read-more:hover { opacity: 0.75; }
    .btn-edit { font-family: 'Roboto Mono', monospace; font-size: 11.5px; background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; transition: all 0.18s; }
    .btn-edit:hover { border-color: var(--primary); color: var(--primary); }
    .btn-delete-sm { font-family: 'Roboto Mono', monospace; font-size: 11.5px; background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.18s; }
    .btn-delete-sm:hover { border-color: var(--danger); color: var(--danger); }

    .empty-state { padding: 60px 0; text-align: center; color: var(--muted); font-size: 15px; }
    .site-footer { margin-top: auto; padding: 24px 48px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }

    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .content-wrap { padding: 24px 20px 60px; } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header"><a href="/" class="site-name">myblog</a></div>
    <nav class="nav-section">
      <div class="nav-label">Navigation</div>
      <a href="/" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="/blog" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Blog
      </a>
    </nav>
    <nav class="nav-section nav-sub">
      <div class="nav-label">Blog</div>
      <a href="/blog" class="nav-link active">Index</a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <a href="/" class="topbar-site">myblog</a>

      <!-- Admin only: write + logout -->
      <div class="topbar-right" sec:authorize="hasRole('ADMIN')">
        <a href="/blog/new" class="btn-new">+ write</a>
        <form th:action="@{/logout}" method="post" style="margin:0">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn-logout">logout</button>
        </form>
      </div>
    </header>

    <div class="content-wrap">
      <div class="page-heading"><h1>Blog</h1></div>

      <ul class="post-list" th:if="${not #lists.isEmpty(blogs)}">
        <li class="post-item" th:each="blog : ${blogs}">
          <div class="post-meta">
            <span th:text="${#temporals.format(blog.createdAt, 'MMMM d, yyyy')}">Date</span>
            <span class="sep">·</span>
            <span th:text="${blog.readMinutes} + ' min read'">5 min read</span>
          </div>
          <h2 class="post-title">
            <a th:href="@{/blog/{id}(id=${blog.id})}" th:text="${blog.title}">Post Title</a>
          </h2>
          <p class="post-excerpt" th:text="${#strings.abbreviate(blog.content, 200)}">Excerpt...</p>
          <div class="post-footer">
            <a th:href="@{/blog/{id}(id=${blog.id})}" class="read-more">Continue reading →</a>

            <!-- Admin only: edit + delete -->
            <a th:href="@{/blog/{id}/edit(id=${blog.id})}" class="btn-edit"
               sec:authorize="hasRole('ADMIN')">edit</a>
            <form sec:authorize="hasRole('ADMIN')"
                  th:action="@{/blog/{id}/delete(id=${blog.id})}" method="post"
                  style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn-delete-sm"
                      onclick="return confirm('Delete this post?')">delete</button>
            </form>
          </div>
        </li>
      </ul>

      <div class="empty-state" th:if="${#lists.isEmpty(blogs)}">
        <p>No posts yet.</p>
      </div>
    </div>

    <footer class="site-footer">Made with Spring Boot &amp; Thymeleaf</footer>
  </div>

</body>
</html>
