<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --panel: #13131a;
      --border: rgba(255,255,255,0.07);
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #f0ece4;
      --muted: #7a7570;
      --input-bg: rgba(255,255,255,0.04);
      --input-focus: rgba(201,168,76,0.12);
      --error: #e05c5c;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px 44px;
      position: relative;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon svg {
      width: 20px; height: 20px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* Error alert */
    .alert {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(224,92,92,0.1);
      border: 1px solid rgba(224,92,92,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 13.5px;
      color: var(--error);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-5px); }
      60%      { transform: translateX(5px); }
    }

    .alert svg { flex-shrink: 0; }

    /* Success alert */
    .alert-success {
      background: rgba(76,201,130,0.1);
      border-color: rgba(76,201,130,0.25);
      color: #4cc982;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px; height: 16px;
      pointer-events: none;
      transition: color 0.2s;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: rgba(122,117,112,0.6); }

    input:focus {
      border-color: rgba(201,168,76,0.5);
      background: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }

    input:focus + svg,
    .input-wrap:focus-within svg { color: var(--gold); }

    /* Eye toggle for password */
    .eye-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s;
    }
    .eye-toggle:hover { color: var(--gold); }

    .field-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .field-footer a {
      font-size: 12.5px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .field-footer a:hover { color: var(--gold); }

    /* Remember me */
    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      cursor: pointer;
    }

    .remember input[type="checkbox"] { display: none; }

    .checkbox-box {
      width: 18px; height: 18px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--input-bg);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .remember input:checked ~ .checkbox-box {
      background: var(--gold);
      border-color: var(--gold);
    }

    .remember input:checked ~ .checkbox-box::after {
      content: '';
      width: 5px; height: 9px;
      border: 2px solid #0d0d0f;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
      display: block;
    }

    .remember span {
      font-size: 13.5px;
      color: var(--muted);
      user-select: none;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #0d0d0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
      pointer-events: none;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.35);
    }

    .btn-login:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .register-link {
      text-align: center;
      font-size: 13.5px;
      color: var(--muted);
    }

    .register-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      margin-left: 4px;
    }

    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="brand-name">MyApp</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to your account</p>

    <!-- Error message (Thymeleaf) -->
    <div class="alert" th:if="${param.error}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Invalid username or password. Please try again.
    </div>

    <!-- Success / logout message -->
    <div class="alert alert-success" th:if="${param.logout}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      You've been signed out successfully.
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post">

      <!-- CSRF token (Spring Security) -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button type="button" class="eye-toggle" onclick="togglePassword()" title="Show/hide password">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="field-footer">
          <a href="/forgot-password">Forgot password?</a>
        </div>
      </div>

      <label class="remember">
        <input type="checkbox" name="remember-me" />
        <span class="checkbox-box"></span>
        <span>Remember me for 30 days</span>
      </label>

      <button type="submit" class="btn-login">Sign In</button>

    </form>

    <div class="divider">OR</div>

    <p class="register-link">
      Don't have an account?
      <a href="/register">Create one</a>
    </p>

  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.innerHTML = isHidden
      ? `<line x1="1" y1="1" x2="23" y2="23"/>
         <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;
  }
</script>

</body>
</html>
