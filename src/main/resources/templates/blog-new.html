<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Write a Post</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #526cfe;
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #737373;
      --border: #e8e8e8;
      --sidebar-bg: #1e1e2e;
      --sidebar-text: rgba(255,255,255,0.87);
      --sidebar-muted: rgba(255,255,255,0.45);
      --sidebar-hover: rgba(255,255,255,0.08);
      --sidebar-active: rgba(82,108,254,0.25);
      --sidebar-width: 260px;
    }
    html, body { height: 100%; font-family: 'Roboto', sans-serif; }
    body { display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-width); min-height: 100vh;
      background: var(--sidebar-bg); position: fixed;
      left: 0; top: 0; bottom: 0; overflow-y: auto; z-index: 100;
    }
    .sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .site-name {
      font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--sidebar-text);
      text-decoration: none; font-family: 'Roboto Mono', monospace; display: block;
    }
    .nav-section { padding: 12px 0; }
    .nav-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sidebar-muted); padding: 8px 16px 4px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 13.5px; color: var(--sidebar-text); text-decoration: none; transition: background 0.15s; border-radius: 4px; margin: 1px 8px; }
    .nav-link:hover { background: var(--sidebar-hover); }
    .nav-link.active { background: var(--sidebar-active); color: #7c9bff; font-weight: 500; }
    .nav-sub { padding-left: 16px; }
    .nav-sub .nav-link { font-size: 12.5px; color: var(--sidebar-muted); padding: 7px 12px; }

    .main { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      height: 48px; background: var(--sidebar-bg);
      display: flex; align-items: center; padding: 0 24px;
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .topbar-site { font-size: 13px; font-weight: 700; color: #fff; text-decoration: none; font-family: 'Roboto Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }

    .content-wrap { max-width: 760px; padding: 48px 48px 80px; }

    .page-heading { margin-bottom: 36px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .page-heading h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }

    .form-group { margin-bottom: 24px; }
    label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    input[type="text"], textarea {
      width: 100%; background: #fff; border: 1px solid var(--border);
      border-radius: 6px; padding: 12px 14px;
      font-family: 'Roboto', sans-serif; font-size: 15px; color: var(--text);
      outline: none; transition: border-color 0.18s, box-shadow 0.18s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(82,108,254,0.1); }
    input::placeholder, textarea::placeholder { color: rgba(115,115,115,0.5); }
    textarea { min-height: 400px; line-height: 1.7; resize: vertical; font-family: 'Roboto Mono', monospace; font-size: 14px; }

    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

    .form-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; }

    .btn-submit {
      background: var(--primary); color: #fff; border: none;
      padding: 12px 32px; border-radius: 6px; font-size: 14px;
      font-weight: 500; cursor: pointer; letter-spacing: 0.02em;
      transition: opacity 0.18s;
    }
    .btn-submit:hover { opacity: 0.85; }

    .btn-cancel { font-size: 13.5px; color: var(--muted); text-decoration: none; transition: color 0.18s; }
    .btn-cancel:hover { color: var(--text); }

    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .content-wrap { padding: 24px 20px 60px; } }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="/" class="site-name">myblog</a>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Navigation</div>
      <a href="/" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="/blog" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Blog
      </a>
    </nav>
    <nav class="nav-section nav-sub">
      <div class="nav-label">Blog</div>
      <a href="/blog" class="nav-link">Index</a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <a href="/" class="topbar-site">myblog</a>
    </header>

    <div class="content-wrap">
      <div class="page-heading">
        <h1>Write a new post</h1>
      </div>

      <form th:action="@{/blog}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="Post title…" required/>
        </div>

        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" placeholder="Write your post here… HTML is supported." required></textarea>
          <p class="hint">💡 You can use HTML tags like &lt;h2&gt;, &lt;p&gt;, &lt;strong&gt;, &lt;pre&gt;&lt;code&gt;…&lt;/code&gt;&lt;/pre&gt;</p>
        </div>

        <div class="form-footer">
          <a href="/blog" class="btn-cancel">← cancel</a>
          <button type="submit" class="btn-submit">Publish →</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
