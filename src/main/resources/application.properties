# ================================
# Server Config
# ================================
server.port=8080

# ================================
# Database — PostgreSQL
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/blogdb
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# Thymeleaf
# ================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ================================
# Blog Settings (customize these)
# ================================
blog.owner.name=Murat
blog.owner.title=Software Developer
blog.owner.bio=I write about programming and technology.
blog.owner.photo=/images/profile.jpg

# ================================
# Admin Credentials
# IMPORTANT: Change these before deploying!
# ================================
blog.admin.username=admin
blog.admin.password=admin123

# Master (writes)
spring.redis.master.host=127.0.0.1
spring.redis.master.port=6379

# Slave (reads)
spring.redis.slave.host=127.0.0.1
spring.redis.slave.port=6380
